<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Visualizador de notas de lanzamiento de BigQuery. Filtra, busca y comparte las últimas novedades y características de BigQuery.">
    <title>BigQuery Release Notes Tracker</title>
    
    <!-- CSS Estilos -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Cabecera de la Aplicación -->
        <header id="app-header">
            <div class="logo-container">
                <div class="logo-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                        <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/>
                    </svg>
                </div>
                <div class="logo-text">
                    <h1>BigQuery Release Notes</h1>
                    <p>Google Cloud Platform Tracker</p>
                </div>
            </div>
            <div class="header-actions">
                <button id="btn-theme-toggle" class="btn-theme-toggle" aria-label="Cambiar tema visual" style="background: transparent; border: 1px solid var(--border-color); color: var(--text-primary); padding: 0.75rem; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all var(--transition-fast); margin-right: 0.5rem;">
                    <!-- Icono Sol -->
                    <svg class="sun-icon" viewBox="0 0 24 24" style="width: 18px; height: 18px; fill: currentColor;">
                        <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.38.39-1.03 0-1.41zm-12.37 12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.38.39-1.03 0-1.41z"/>
                    </svg>
                    <!-- Icono Luna -->
                    <svg class="moon-icon" viewBox="0 0 24 24" style="width: 18px; height: 18px; fill: currentColor; display: none;">
                        <path d="M12.3 22h-.1c-5.5 0-10-4.5-10-10C2.2 6.7 6.5 2.2 12 2.2c.5 0 1 .4 1 .9 0 .4-.3.8-.7.9-3.8.7-6.3 4.4-5.6 8.2.5 3 2.9 5.4 5.9 5.9 3.8.7 7.5-1.8 8.2-5.6.1-.4.5-.7.9-.7.5 0 .9.4.9 1 0 5.5-4.5 10-10 10.1z"/>
                    </svg>
                </button>
                <button id="btn-export-csv" class="btn-secondary" aria-label="Exportar notas de lanzamiento a CSV" style="margin-right: 0.5rem;">
                    <svg viewBox="0 0 24 24" aria-hidden="true" style="width: 18px; height: 18px; fill: currentColor;">
                        <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM17 13l-5 5-5-5h3V9h4v4h3z"/>
                    </svg>
                    <span>Exportar CSV</span>
                </button>
                <button id="btn-refresh" class="btn-refresh" aria-label="Actualizar notas de lanzamiento">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                    </svg>
                    <span>Actualizar</span>
                </button>
            </div>
        </header>

        <!-- Filtros y Barra de Búsqueda -->
        <section class="filter-panel" aria-label="Controles de filtrado y búsqueda">
            <div class="search-box">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                </svg>
                <input type="text" id="search-input" placeholder="Buscar en las notas de lanzamiento..." aria-label="Buscar en las notas de lanzamiento">
            </div>
            
            <div class="filter-tags">
                <span class="filter-label">Filtros:</span>
                <button class="tag-btn active" data-filter="all">Todos</button>
                <button class="tag-btn" data-filter="FEATURE">Novedades</button>
                <button class="tag-btn" data-filter="FIX">Correcciones</button>
                <button class="tag-btn" data-filter="CHANGED">Cambios</button>
                <button class="tag-btn" data-filter="DEPRECATED">Deprecaciones</button>
                <button class="tag-btn" data-filter="BREAKING">Críticos</button>
            </div>
        </section>

        <!-- Panel Compositor de Tweets (Dinámico) -->
        <section id="tweet-composer" class="tweet-composer" aria-label="Compositor de Twitter">
            <div class="tweet-composer-header">
                <div class="tweet-composer-title">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                    </svg>
                    <span>Compartir en Twitter</span>
                </div>
                <button id="btn-close-composer" class="btn-close-composer" aria-label="Descartar tweet y selección">×</button>
            </div>
            <div class="tweet-textarea-wrapper">
                <textarea id="tweet-textarea" class="tweet-textarea" aria-label="Contenido del Tweet"></textarea>
            </div>
            <div class="tweet-composer-footer">
                <span id="tweet-char-counter" class="tweet-char-counter">280 caracteres restantes</span>
                <button id="btn-tweet-now" class="btn-tweet-now">
                    <span>Twittear ahora</span>
                </button>
            </div>
        </section>

        <!-- Contenedor Principal de Notas de Lanzamiento -->
        <main id="releases-container" class="releases-list" aria-live="polite">
            <!-- Skeleton cards cargadas por defecto -->
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
        </main>
    </div>

    <!-- Script de Aplicación -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
